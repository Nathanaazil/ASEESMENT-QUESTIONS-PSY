<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Assessment Submitted</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1F4E78, #2E75B6);
      color: white;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      margin: 0; padding: 20px;
    }
    .card {
      background: white; color: #2c3e50;
      max-width: 480px; width: 100%;
      padding: 48px 36px; border-radius: 16px;
      text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    .check {
      width: 80px; height: 80px;
      background: #27ae60; border-radius: 50%;
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; color: white;
    }
    h1 { font-size: 26px; margin-bottom: 12px; color: #1F4E78; }
    p { font-size: 15px; line-height: 1.6; color: #4a5a6a; margin-bottom: 14px; }
    .small { font-size: 13px; color: #95a5b3; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Thank You</h1>
    <p>Your assessment has been submitted successfully. Your responses are confidential and will be used only for research and organizational improvement purposes.</p>
    <p>We appreciate the time and honesty you brought to this.</p>
    <p class="small">You can safely close this window.</p>
  </div>
</body>
</html>
